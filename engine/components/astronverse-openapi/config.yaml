  OpenApi.speech_tts_ultra_human:
    title: 超拟人语音合成
    comment: 输入文本并生成语音文件
    icon: general-text-recognition
    helpManual: ''
    inputList:
      - key: text
        title: 合成文本
        tip: 输入需要合成的文本内容
      - key: voice
        title: 发音人
        tip: 输入讯飞发音人标识，默认 xiaoyan
      - key: speed
        title: 语速
        tip: 0-100，默认 50
      - key: volume
        title: 音量
        tip: 0-100，默认 50
      - key: pitch
        title: 音高
        tip: 0-100，默认 50
      - key: dst_file
        title: 音频输出路径
        tip: 选择音频输出文件夹
      - key: dst_file_name
        title: 音频文件名
        tip: 选择输出音频文件名
      - key: audio_format
        title: 音频格式
        tip: 默认 mp3
    outputList:
      - key: audio_file
        title: 音频文件路径
        tip: 输出生成的音频文件路径
      - key: result
        title: 合成结果对象
        tip: 输出完整合成结果对象
