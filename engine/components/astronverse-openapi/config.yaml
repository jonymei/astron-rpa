    title: 中文语音识别大模型
    comment: 上传单个音频文件，识别中文语音并返回文本结果
    icon: general-text-recognition
    helpManual: ''
    inputList:
      - key: src_file
        title: 音频文件
        tip: 选择单个音频文件
      - key: is_save
        title: 保存结果
        tip: 是否将识别结果保存到本地文件
      - key: dst_file
        title: 结果输出路径
        tip: 选择结果输出文件夹
      - key: dst_file_name
